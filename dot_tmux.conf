# Remap the prefix from C-b to C-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Use more intuitive split bindings
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload the config and confirm it succeeded
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Start windows and panes at 1 to match on-screen numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Keep window names stable
set-option -g allow-rename off

# Make tmux feel snappier and give apps better focus information.
set -sg escape-time 10
set -g focus-events on
set -g history-limit 50000

# Enable mouse support when you want easier pane selection and scrolling.
# set -g mouse on

# Advertise a modern terminal and enable truecolor when supported
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,tmux-256color:RGB"

set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#1f2335,fg=#c0caf5"
set -g status-left-length 24
set -g status-left "#[fg=#1f2335,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#1f2335] "
set -g status-right "#[fg=#e0af68,bg=#1f2335,bold]#{?client_prefix, PREFIX ,}#[fg=#7f849c,bg=#1f2335] %H:%M "

setw -g window-status-separator ""
setw -g window-status-format "#[fg=#7f849c,bg=#1f2335] #I:#W#F "
setw -g window-status-current-format "#[fg=#1f2335,bg=#e0af68,bold] #I:#W#F "
setw -g window-status-style "bg=#1f2335,fg=#7f849c"
setw -g window-status-current-style "bg=#e0af68,fg=#1f2335,bold"
setw -g window-status-activity-style "bg=#1f2335,fg=#9ece6a,bold"

set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#7aa2f7,fg=#1f2335,bold"
setw -g mode-style "bg=#7aa2f7,fg=#1f2335,bold"

# Make copy mode use vi-style keys.
setw -g mode-keys vi
